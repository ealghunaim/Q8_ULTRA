<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0F1C23">
<title>Q8_ULTRA · Master</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F1C23;--paper:#FAF7F0;--card:#fff;--line:#E8E1D2;--mute:#6B7A80;--faint:#9AA6AA;
--teal:#78BBB1;--tealD:#3E7A71;--tealP:#E6F1EF;--sand:#EBCC8F;--sandD:#D8AF6D;--sandP:#F7EDD6;--red:#C0554E}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:430px;margin:0 auto;padding:20px 16px 60px}
.eyebrow{font-family:"Barlow Condensed",sans-serif;font-weight:700;letter-spacing:.22em;font-size:12px;color:var(--sandD);text-transform:uppercase}
.word{font-family:"Montserrat",sans-serif;font-weight:800;letter-spacing:-.02em;font-size:26px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 1px 3px rgba(15,28,35,.05)}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin:14px 0 5px}
input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;font-size:15px;background:#fff;color:var(--ink);outline:none}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(120,187,177,.22)}
button{cursor:pointer;font-family:inherit}
.btn{width:100%;margin-top:18px;background:var(--ink);color:var(--sand);border:0;border-radius:12px;padding:13px;font-size:15px;font-weight:700;box-shadow:0 2px 10px rgba(15,28,35,.18)}
.btn[disabled]{opacity:.45;cursor:default}
.err{color:var(--red);font-size:13px;font-weight:700;margin-top:10px;min-height:18px}
.logo{width:76px;height:76px;border-radius:20px;display:block;margin:6px auto 12px}
.center{text-align:center}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.top img{width:40px;height:40px;border-radius:12px}
.ghost{background:#fff;border:1.5px solid var(--line);color:var(--mute);border-radius:10px;padding:8px 12px;font-size:12.5px;font-weight:700}
.stat{font-size:13px;color:var(--mute);margin:2px 0 12px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:8px}
.mail{font-size:13.5px;font-weight:600;word-break:break-all}
.sub{font-size:11px;color:var(--faint);margin-top:2px}
.tag{font-family:"Barlow Condensed",sans-serif;font-weight:700;letter-spacing:.18em;font-size:11px;padding:4px 9px;border-radius:8px}
.tag.master{background:var(--sandP);border:1px solid var(--sandD);color:#8A6A2E}
.tgl{border-radius:10px;padding:8px 12px;font-size:12.5px;font-weight:700;white-space:nowrap;border:1.5px solid}
.tgl.on{background:var(--tealD);border-color:var(--tealD);color:#fff}
.tgl.off{background:#fff;border-color:var(--line);color:var(--mute)}
.note{font-size:11.5px;color:var(--faint);line-height:1.5;margin-top:14px}
a{color:var(--tealD);font-weight:700;text-decoration:none}
#search{margin-bottom:12px}
.dune{display:block;width:100%;height:20px;margin:8px 0 14px}
[hidden]{display:none !important}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="wrap" id="login">
  <div style="height:26px"></div>
  <div class="card center">
    <img class="logo" src="/icon-192.png" alt="Q8_ULTRA">
    <div class="word">Q8_ULTRA</div>
    <div class="eyebrow">Master access</div>
    <div style="text-align:left">
      <label for="user">Username</label>
      <input id="user" placeholder="Q8_ULTRA" autocapitalize="off" autocomplete="username">
      <label for="pin">PIN</label>
      <input id="pin" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="err" id="lerr"></div>
    <button class="btn" id="go">Unlock</button>
  </div>
</div>

<!-- PANEL -->
<div class="wrap" id="panel" hidden>
  <div class="top">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="/icon-192.png" alt="">
      <div>
        <div class="word" style="font-size:18px">Directors</div>
        <div class="eyebrow" style="color:var(--mute)">Q8_ULTRA · Master</div>
      </div>
    </div>
    <button class="ghost" id="out">Sign out</button>
  </div>
  <svg class="dune" viewBox="0 0 400 20" preserveAspectRatio="none">
    <rect x="0" y="5" width="400" height="8" fill="#78BBB1"/>
    <path d="M0,12 C60,5 130,17 200,12 C270,7 330,17 400,10 L400,20 L0,20 Z" fill="#EBCC8F"/>
    <path d="M0,17 C80,11 160,20 240,16 C310,13 360,19 400,15 L400,20 L0,20 Z" fill="#D8AF6D"/>
  </svg>
  <div class="stat" id="stat">Loading…</div>
  <input id="search" placeholder="Search members…">
  <div id="list"></div>
  <div class="note">Tap a member to grant or revoke director — changes apply from their next sign-in.
  Announcements: post from <a href="/">the app</a>; this master login is a director there, signed Q8_ULTRA.</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://hixgnklexzvrbtplykjp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tQBrbVA3yFbOpPREX9yUgw_JNZMwwb-";
// ▼ One-time edit: put the master account's email here so "Q8_ULTRA" works as the username.
const MASTER_EMAIL = "PUT-MASTER-EMAIL-HERE";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = (id) => document.getElementById(id);
let members = [];

function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function render(){
  const q = $("search").value.trim().toLowerCase();
  const shown = members.filter(m => !q || (m.email||"").toLowerCase().includes(q));
  const dn = members.filter(m => m.is_director && !m.is_master).length;
  $("stat").textContent = dn + " director" + (dn===1?"":"s") + " · " + members.length + " member" + (members.length===1?"":"s");
  $("list").innerHTML = shown.map(m => `
    <div class="row">
      <div style="min-width:0">
        <div class="mail">${esc(m.email||"—")}</div>
        <div class="sub">${m.is_master ? "full control · managed in Supabase only" : m.is_director ? "can post news &amp; moderate" : "member"}</div>
      </div>
      ${ m.is_master
        ? `<span class="tag master">MASTER</span>`
        : `<button class="tgl ${m.is_director?"on":"off"}" data-id="${m.id}" data-make="${!m.is_director}">${m.is_director ? "DIRECTOR ✓" : "Make director"}</button>` }
    </div>`).join("") || `<div class="note">No members match.</div>`;
}

async function refresh(){
  const { data, error } = await sb.rpc("get_members");
  if (error) throw error;
  members = data || [];
  render();
}

async function enterPanel(){
  await refresh();
  $("login").hidden = true;
  $("panel").hidden = false;
}

$("go").addEventListener("click", async () => {
  const u = $("user").value.trim();
  const pin = $("pin").value;
  $("lerr").textContent = "";
  if (!u || !pin) { $("lerr").textContent = "Enter the username and PIN."; return; }
  let email = u;
  if (u.toUpperCase() === "Q8_ULTRA" || u.toUpperCase() === "Q8ULTRA") {
    if (MASTER_EMAIL.includes("PUT-MASTER-EMAIL")) {
      $("lerr").textContent = "Master email not set in this file yet — type the master account's email instead.";
      return;
    }
    email = MASTER_EMAIL;
  }
  $("go").disabled = true; $("go").textContent = "Checking…";
  const { error } = await sb.auth.signInWithPassword({ email, password: pin });
  if (error) {
    $("lerr").textContent = "Wrong PIN or account.";
  } else {
    try { await enterPanel(); }
    catch { await sb.auth.signOut(); $("lerr").textContent = "That account isn't the master."; }
  }
  $("go").disabled = false; $("go").textContent = "Unlock";
});

$("pin").addEventListener("keydown", e => { if (e.key === "Enter") $("go").click(); });
$("search").addEventListener("input", render);
$("out").addEventListener("click", async () => { await sb.auth.signOut(); location.reload(); });

$("list").addEventListener("click", async (e) => {
  const b = e.target.closest(".tgl"); if (!b) return;
  const id = b.dataset.id, make = b.dataset.make === "true";
  b.disabled = true; b.textContent = "…";
  const { error } = await sb.rpc("set_director", { target: id, make });
  if (error) { alert("Couldn't update: " + error.message); }
  else { const m = members.find(x => x.id === id); if (m) m.is_director = make; }
  render();
});

// restore an existing master session
const { data: { session } } = await sb.auth.getSession();
if (session) { try { await enterPanel(); } catch { await sb.auth.signOut(); } }
</script>
</body>
</html>
